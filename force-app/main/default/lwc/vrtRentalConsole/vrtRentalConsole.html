<template>
    <lightning-card title="Consola de Alquileres" icon-name="standard:contract">

        <!-- Spinner de carga -->
        <template lwc:if={isLoading}>
            <lightning-spinner alternative-text="Cargando..." size="medium"></lightning-spinner>
        </template>

        <!-- Error -->
        <template lwc:if={error}>
            <div class="slds-p-around_medium">
                <div class="slds-text-color_error slds-text-body_regular">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error"
                        class="slds-m-right_x-small"></lightning-icon>
                    {error}
                </div>
            </div>
        </template>

        <!-- KPIs -->
        <div class="slds-p-horizontal_medium slds-p-top_medium">
            <div class="slds-grid slds-gutters slds-wrap">
                <!-- Total -->
                <div class="slds-col slds-size_1-of-5">
                    <div class="kpi-card kpi-total">
                        <p class="kpi-value">{totalRentals}</p>
                        <p class="kpi-label">Total</p>
                    </div>
                </div>
                <!-- Activos -->
                <div class="slds-col slds-size_1-of-5">
                    <div class="kpi-card kpi-active">
                        <p class="kpi-value">{activeRentals}</p>
                        <p class="kpi-label">En Curso</p>
                    </div>
                </div>
                <!-- Completados -->
                <div class="slds-col slds-size_1-of-5">
                    <div class="kpi-card kpi-completed">
                        <p class="kpi-value">{completedRentals}</p>
                        <p class="kpi-label">Completados</p>
                    </div>
                </div>
                <!-- Cancelados -->
                <div class="slds-col slds-size_1-of-5">
                    <div class="kpi-card kpi-cancelled">
                        <p class="kpi-value">{cancelledRentals}</p>
                        <p class="kpi-label">Cancelados</p>
                    </div>
                </div>
                <!-- Coste Total -->
                <div class="slds-col slds-size_1-of-5">
                    <div class="kpi-card kpi-cost">
                        <p class="kpi-value kpi-value-cost">{totalCost}</p>
                        <p class="kpi-label">Coste Total</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles: Filtro + Refrescar -->
        <div class="slds-p-horizontal_medium slds-p-top_medium">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-end">
                <div class="slds-col">
                    <lightning-combobox label="Filtrar por estado" value={selectedStatus} options={statusOptions}
                        onchange={handleStatusChange} variant="label-hidden" placeholder="Filtrar por estado">
                    </lightning-combobox>
                </div>
                <div class="slds-col">
                    <lightning-button label="Refrescar" icon-name="utility:refresh" onclick={handleRefresh}
                        variant="neutral">
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- Tabla de alquileres -->
        <div class="slds-p-around_medium">
            <template lwc:if={hasRentals}>
                <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_x-small">
                    {tableTitle}
                </p>
                <lightning-datatable key-field="Id" data={filteredRentals} columns={columns} hide-checkbox-column
                    show-row-number-column>
                </lightning-datatable>
            </template>

            <template lwc:if="{!hasRentals}">
                <template lwc:if="{!isLoading}">
                    <div class="slds-align_absolute-center slds-p-vertical_large">
                        <div class="slds-text-align_center">
                            <lightning-icon icon-name="utility:info" size="large"
                                class="slds-m-bottom_small"></lightning-icon>
                            <p class="slds-text-body_regular slds-text-color_weak">
                                No se encontraron alquileres para esta cuenta.
                            </p>
                        </div>
                    </div>
                </template>
            </template>
        </div>

    </lightning-card>
</template>
